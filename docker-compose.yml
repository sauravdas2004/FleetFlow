version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: fleetflow-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: fleetflow_secret
      MONGO_INITDB_DATABASE: fleetflow

  redis:
    image: redis:7-alpine
    container_name: fleetflow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fleetflow-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:fleetflow_secret@mongodb:27017/fleetflow?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-in-production}
      CLIENT_URL: http://localhost:5173
      MAPBOX_TOKEN: ${MAPBOX_TOKEN:-}
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleetflow-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: fleetflow-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mongodb_data:
  redis_data:
